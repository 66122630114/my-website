<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Note Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0f;--surface:#161619;--surface2:#1e1e23;
    --border:#2a2a32;--border2:#3a3a46;
    --accent:#e8ff47;--accent2:#47ffb8;--accent3:#ff6b47;
    --text:#f0f0f5;--text2:#8888a0;--text3:#555568;
    --correct:#47ffb8;--wrong:#ff6b47;
    --mono:'Space Mono',monospace;--sans:'Sarabun',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 3rem;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,255,71,.04) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 80% 90%,rgba(71,255,184,.04) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .app{width:100%;max-width:520px;position:relative;z-index:1;}

  .header{margin-bottom:1.25rem;display:flex;align-items:baseline;gap:12px;}
  .header-title{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;}
  .header-sub{font-size:13px;color:var(--text3);}

  /* mode tabs */
  .mode-row{display:flex;gap:0;margin-bottom:1.25rem;border:0.5px solid var(--border2);border-radius:4px;overflow:hidden;}
  .mode-btn{flex:1;padding:8px 6px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:transparent;color:var(--text3);border:none;cursor:pointer;transition:all .15s;border-right:0.5px solid var(--border2);}
  .mode-btn:last-child{border-right:none;}
  .mode-btn:hover{color:var(--text2);background:var(--surface2);}
  .mode-btn.active{background:var(--accent);color:var(--bg);}
  .mode-btn.soon{color:var(--text3);cursor:default;opacity:.4;}

  /* note display */
  .note-display{background:var(--surface);border:0.5px solid var(--border);border-radius:4px;padding:1.5rem 2rem 1.25rem;text-align:center;margin-bottom:1rem;position:relative;overflow:hidden;}
  .note-display::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(232,255,71,.03) 0%,transparent 70%);pointer-events:none;}
  .note-prompt{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--text3);text-transform:uppercase;margin-bottom:.5rem;}
  .note-big{font-family:var(--mono);font-size:82px;font-weight:700;line-height:1;color:var(--text);transition:color .3s;letter-spacing:-.02em;position:relative;z-index:1;}
  .note-big.correct{color:var(--correct);}
  .note-alias{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:6px;letter-spacing:.06em;min-height:18px;}

  /* scale info bar */
  .scale-bar{background:var(--surface2);border:0.5px solid var(--border);border-radius:4px;padding:.625rem 1rem;margin-bottom:1rem;display:flex;flex-direction:column;gap:8px;}
  .scale-bar-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .scale-name{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;}
  .scale-notes{display:flex;gap:4px;flex-wrap:wrap;}
  .scale-dot{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:2px;border:0.5px solid var(--border2);color:var(--text3);transition:all .3s;}
  .scale-dot.done{background:rgba(71,255,184,.15);border-color:var(--correct);color:var(--correct);}
  .scale-dot.current{background:rgba(232,255,71,.12);border-color:var(--accent);color:var(--accent);}
  .scale-progress{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text2);white-space:nowrap;}

  /* shape selector */
  .shape-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
  .shape-lbl{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;align-self:center;text-transform:uppercase;flex-shrink:0;}
  .shape-btn{padding:4px 10px;font-size:11px;font-family:var(--mono);border-radius:2px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;letter-spacing:.04em;transition:all .15s;font-weight:700;}
  .shape-btn:hover{border-color:var(--accent);color:var(--accent);}
  .shape-btn.active{background:var(--surface2);border-color:var(--accent2);color:var(--accent2);}

  /* fretboard */
  .fretboard-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:4px;padding:.875rem 1rem;margin-bottom:1rem;overflow-x:auto;}
  .fretboard-svg{display:block;width:100%;}

  /* waveform */
  .waveform{height:28px;display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:1rem;}
  .wv-bar{width:3px;background:var(--border2);border-radius:2px;min-height:3px;transition:height .07s,background .3s;}
  .wv-bar.active{background:var(--accent2);}

  /* detected */
  .detected-panel{background:var(--surface);border:0.5px solid var(--border);border-radius:4px;padding:.875rem 1.25rem;display:grid;grid-template-columns:1fr auto;align-items:center;gap:1rem;margin-bottom:1rem;}
  .detected-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:3px;}
  .detected-note{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--text2);line-height:1;transition:color .2s;}
  .detected-note.match{color:var(--correct);}
  .detected-note.mismatch{color:var(--wrong);}
  .detected-note.paused{color:var(--text3);}
  .detected-right{text-align:right;}
  .detected-hz{font-family:var(--mono);font-size:13px;color:var(--text2);line-height:1;margin-bottom:3px;}
  .detected-cents{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.04em;}

  /* cooldown bar */
  .cooldown-wrap{margin-bottom:.75rem;display:none;}
  .cooldown-wrap.visible{display:block;}
  .cooldown-lbl{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
  .cooldown-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .cooldown-fill{height:100%;width:100%;background:var(--accent);border-radius:2px;transition:width .05s linear;}

  /* status */
  .status-bar{border-radius:4px;padding:9px 14px;font-size:12px;font-family:var(--mono);letter-spacing:.04em;display:flex;align-items:center;gap:8px;margin-bottom:1rem;border:0.5px solid var(--border);color:var(--text3);background:var(--surface);transition:all .25s;min-height:38px;}
  .status-bar.listening{border-color:rgba(71,255,184,.3);color:var(--accent2);background:rgba(71,255,184,.05);}
  .status-bar.correct{border-color:rgba(71,255,184,.5);color:var(--correct);background:rgba(71,255,184,.08);}
  .status-bar.wrong{border-color:rgba(255,107,71,.3);color:var(--wrong);background:rgba(255,107,71,.05);}
  .status-bar.cooldown{border-color:rgba(232,255,71,.3);color:var(--accent);background:rgba(232,255,71,.05);}
  .mic-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);flex-shrink:0;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

  /* buttons */
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem;}
  .btn{padding:11px 14px;border-radius:4px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn:hover{border-color:var(--text2);color:var(--text);}
  .btn:active{transform:scale(.98);}
  .btn-accent{background:var(--accent);color:var(--bg);border-color:var(--accent);}
  .btn-accent:hover{background:#d4eb3f;border-color:#d4eb3f;color:var(--bg);}
  .btn-stop{border-color:rgba(255,107,71,.4);color:var(--wrong);}
  .btn-stop:hover{border-color:var(--wrong);background:rgba(255,107,71,.08);}

  /* score */
  .score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .score-card{background:var(--surface);border:0.5px solid var(--border);border-radius:4px;padding:.75rem 1rem;text-align:center;}
  .score-num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px;}
  .score-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.1em;color:var(--text3);text-transform:uppercase;}

  /* coming soon */
  .coming-soon{background:var(--surface);border:0.5px dashed var(--border2);border-radius:4px;padding:3rem 2rem;text-align:center;margin-bottom:1rem;}
  .cs-label{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;}

  @keyframes ring-grow{from{transform:scale(.8);opacity:.8;}to{transform:scale(1.4);opacity:0;}}
  .confirm-ring{position:absolute;inset:0;border:2px solid var(--correct);border-radius:4px;pointer-events:none;animation:ring-grow .6s ease-out forwards;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="header-title">Guitar Note Trainer</span>
    <span class="header-sub">ฝึกจำตำแหน่งโน๊ตบนคอกีต้าร์</span>
  </div>

  <div class="mode-row">
    <button class="mode-btn active" onclick="setMode('simple')" id="tab-simple">7 Note</button>
    <button class="mode-btn" onclick="setMode('scale')" id="tab-scale">Fretboard</button>
    <button class="mode-btn soon">Coming Soon</button>
  </div>

  <!-- Note display -->
  <div class="note-display" id="note-display">
    <div class="note-prompt" id="note-prompt">// โน๊ตที่ต้องเล่น</div>
    <div class="note-big" id="target-note">?</div>
    <div class="note-alias" id="target-alias">— กด ROLL เพื่อเริ่ม —</div>
  </div>

  <!-- Scale mode: shape selector + progress bar (hidden in simple mode) -->
  <div id="scale-ui" style="display:none;">
    <div class="shape-row">
      <span class="shape-lbl">Shape</span>
      <button class="shape-btn active" onclick="selectShape('C')" id="sh-C">C</button>
      <button class="shape-btn" onclick="selectShape('A')" id="sh-A">A</button>
      <button class="shape-btn" onclick="selectShape('G')" id="sh-G">G</button>
      <button class="shape-btn" onclick="selectShape('E')" id="sh-E">E</button>
      <button class="shape-btn" onclick="selectShape('D')" id="sh-D">D</button>
    </div>
    <div class="scale-bar">
      <div class="scale-bar-top">
        <span class="scale-name" id="scale-name">C Shape — C Major</span>
        <span class="scale-progress" id="scale-progress">0/7</span>
      </div>
      <div class="scale-notes" id="scale-dots"></div>
    </div>
    <div class="fretboard-wrap">
      <svg class="fretboard-svg" id="fretboard-svg" viewBox="0 0 480 150" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!-- Waveform -->
  <div class="waveform">
    <div class="wv-bar" style="height:4px"></div><div class="wv-bar" style="height:8px"></div>
    <div class="wv-bar" style="height:14px"></div><div class="wv-bar" style="height:10px"></div>
    <div class="wv-bar" style="height:20px"></div><div class="wv-bar" style="height:14px"></div>
    <div class="wv-bar" style="height:8px"></div><div class="wv-bar" style="height:16px"></div>
    <div class="wv-bar" style="height:22px"></div><div class="wv-bar" style="height:14px"></div>
    <div class="wv-bar" style="height:8px"></div><div class="wv-bar" style="height:18px"></div>
    <div class="wv-bar" style="height:12px"></div><div class="wv-bar" style="height:6px"></div>
    <div class="wv-bar" style="height:10px"></div><div class="wv-bar" style="height:6px"></div>
    <div class="wv-bar" style="height:4px"></div><div class="wv-bar" style="height:8px"></div>
    <div class="wv-bar" style="height:12px"></div><div class="wv-bar" style="height:8px"></div>
  </div>

  <!-- Detected -->
  <div class="detected-panel">
    <div>
      <div class="detected-lbl">// ตรวจจับได้</div>
      <div class="detected-note" id="detected-note">—</div>
    </div>
    <div class="detected-right">
      <div class="detected-hz" id="detected-hz">— Hz</div>
      <div class="detected-cents" id="detected-cents"></div>
    </div>
  </div>

  <!-- Cooldown bar -->
  <div class="cooldown-wrap" id="cooldown-wrap">
    <div class="cooldown-lbl">// รอก่อน...</div>
    <div class="cooldown-track"><div class="cooldown-fill" id="cooldown-fill"></div></div>
  </div>

  <!-- Status (hidden in fretboard mode) -->
  <div class="status-bar" id="status-bar">
    <span style="font-size:16px;">◦</span><span>ยังไม่ได้เปิดไมค์</span>
  </div>

  <!-- Buttons -->
  <div class="btn-row" id="btn-row">
    <button class="btn btn-accent" onclick="rollNote()" id="btn-roll">⟳ ROLL</button>
    <button class="btn" onclick="startListening()" id="btn-start">● REC</button>
    <button class="btn btn-stop" onclick="stopListening()" id="btn-stop" style="display:none;grid-column:2;">■ STOP</button>
  </div>

  <!-- Score (hidden in fretboard mode) -->
  <div class="score-row" id="score-row">
    <div class="score-card"><div class="score-num" id="sc-correct">0</div><div class="score-lbl">ถูก</div></div>
    <div class="score-card"><div class="score-num" id="sc-total">0</div><div class="score-lbl">รวม</div></div>
    <div class="score-card"><div class="score-num" id="sc-pct">—</div><div class="score-lbl">แม่น</div></div>
  </div>

</div>
<script>
/* ═══════════════════════════════════════════════════
   FRETBOARD DATA
═══════════════════════════════════════════════════ */
const NOTES_ALL = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_7   = ['C','D','E','F','G','A','B'];
const ALIASES   = {'C#':'D♭','D#':'E♭','F#':'G♭','G#':'A♭','A#':'B♭'};

// Standard tuning open string: index 0 = low E (string 6), 5 = high e (string 1)
const OPEN_NOTES = ['E','A','D','G','B','E'];
const OPEN_MIDI  = [40,45,50,55,59,64]; // MIDI numbers for open strings

// Full fretboard: FRETBOARD[stringIdx][fret] = note name
const FRETBOARD = OPEN_NOTES.map(o => {
  const s = NOTES_ALL.indexOf(o);
  return Array.from({length:25}, (_,f) => NOTES_ALL[(s+f)%12]);
});

/* ═══════════════════════════════════════════════════
   CAGED MAJOR SCALE SHAPES — key of C
   Format: [ [string(0=lowE), fret], ... ] ordered low→high for playing sequence
   Root notes marked with 'R' property in rendering
═══════════════════════════════════════════════════ */

// Each shape: array of {s: stringIdx(0=lowE..5=highE), f: fret, note: noteName, isRoot: bool}
// C Major notes: C D E F G A B

function buildCagedShapes() {
  // Define CAGED shapes as [string, fret] patterns relative to key of C major
  // These are the classic C major CAGED positions (fixed key C for now)

  // C SHAPE (open position, frets 0-3)
  // Strings 6-1 (low E to high e), notes: E2 F2 G2 A2 B2 C3 D3 E3 F3 G3 A3 B3 C4 D4 E4
  const C_shape = [
    {s:0,f:0},{s:0,f:2},{s:0,f:3},          // low E: E F G
    {s:1,f:0},{s:1,f:2},{s:1,f:3},          // A: A B C
    {s:2,f:0},{s:2,f:2},                    // D: D E
    {s:3,f:0},{s:3,f:2},                    // G: G A
    {s:4,f:0},{s:4,f:1},{s:4,f:3},          // B: B C D
    {s:5,f:0},{s:5,f:1},{s:5,f:3},          // high e: E F G
  ];

  // A SHAPE (root on A string fret 3 = C, frets 3-6)
  const A_shape = [
    {s:0,f:3},{s:0,f:5},                    // low E: G A
    {s:1,f:3},{s:1,f:5},                    // A: C D
    {s:2,f:2},{s:2,f:3},{s:2,f:5},         // D: E F G
    {s:3,f:2},{s:3,f:4},{s:3,f:5},         // G: A B C
    {s:4,f:3},{s:4,f:5},                    // B: D E
    {s:5,f:3},{s:5,f:5},                    // high e: G A
  ];

  // G SHAPE (root on low E fret 8 = C ... but C major G shape sits frets 5-8)
  const G_shape = [
    {s:0,f:5},{s:0,f:7},                    // low E: A B
    {s:1,f:5},{s:1,f:7},                    // A: D E
    {s:2,f:5},{s:2,f:7},                    // D: G A
    {s:3,f:4},{s:3,f:5},{s:3,f:7},         // G: B C D
    {s:4,f:5},{s:4,f:6},{s:4,f:8},         // B: E F G
    {s:5,f:5},{s:5,f:7},{s:5,f:8},         // high e: A B C
  ];

  // E SHAPE (root on low E fret 8 = C, frets 7-10)
  const E_shape = [
    {s:0,f:7},{s:0,f:8},{s:0,f:10},        // low E: B C D
    {s:1,f:7},{s:1,f:8},{s:1,f:10},        // A: E F G
    {s:2,f:7},{s:2,f:9},{s:2,f:10},        // D: B C D — wait, correct:
    {s:2,f:7},{s:2,f:9},                   // D: A B
    {s:3,f:7},{s:3,f:9},{s:3,f:10},        // G: C D E
    {s:4,f:8},{s:4,f:10},                   // B: F G
    {s:5,f:7},{s:5,f:8},{s:5,f:10},        // high e: B C D
  ];

  // D SHAPE (root on D string fret 10 = C, frets 9-12)
  const D_shape = [
    {s:0,f:10},{s:0,f:12},                  // low E: D E
    {s:1,f:10},{s:1,f:12},                  // A: G A
    {s:2,f:9},{s:2,f:10},{s:2,f:12},       // D: C D E
    {s:3,f:9},{s:3,f:10},{s:3,f:12},       // G: F G A — wait:
    {s:3,f:9},{s:3,f:11},{s:3,f:12},       // G: E F G
    {s:4,f:10},{s:4,f:12},                  // B: A B
    {s:5,f:10},{s:5,f:12},                  // high e: D E
  ];

  // Build clean shapes from fretboard note data
  return { C_shape, A_shape, G_shape, E_shape, D_shape };
}

// Better approach: derive positions from actual fretboard note data
// C Major notes
const C_MAJOR = ['C','D','E','F','G','A','B'];

// Define shape fret windows (fret ranges) for C major
const SHAPE_DEFS = {
  C: { label:'C Shape', fretMin:0, fretMax:3,  rootNote:'C', startFret:0  },
  A: { label:'A Shape', fretMin:3, fretMax:6,  rootNote:'C', startFret:3  },
  G: { label:'G Shape', fretMin:5, fretMax:8,  rootNote:'C', startFret:5  },
  E: { label:'E Shape', fretMin:7, fretMax:10, rootNote:'C', startFret:7  },
  D: { label:'D Shape', fretMin:9, fretMax:12, rootNote:'C', startFret:9  },
};

// For each shape, get all (string,fret) positions in fret window containing C major notes
// ordered ascending by pitch (MIDI)
function getShapePositions(shapeName) {
  const def = SHAPE_DEFS[shapeName];
  const positions = [];
  for (let s = 0; s < 6; s++) {
    for (let f = def.fretMin; f <= def.fretMax; f++) {
      const note = FRETBOARD[s][f];
      if (C_MAJOR.includes(note)) {
        const midi = OPEN_MIDI[s] + f;
        const oct  = Math.floor(midi/12) - 1;
        positions.push({ s, f, note, oct, midi, id:`${s}-${f}`, isRoot: note==='C' });
      }
    }
  }
  // sort ascending by midi (low to high = natural playing order)
  positions.sort((a,b) => a.midi - b.midi);
  return positions;
}

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let currentMode  = 'simple';
let targetNote   = null;   // simple mode

// scale mode
let currentShape     = 'C';
let scalePositions   = [];  // all positions in current shape (ordered)
let scaleIndex       = 0;   // current position index
let scaleDoneSet     = new Set(); // ids of completed positions

// shared audio
let audioCtx=null, analyser=null, sourceNode=null, stream=null;
let isListening=false;
let animFrameId=null, waveAnimId=null;

// match hold (require N consecutive frames of same note)
let matchHoldCount=0, lastDetected=null;
const MATCH_HOLD_REQUIRED = 6;

// cooldown between notes
let isCooldown = false;
let cooldownTimer = null;
const COOLDOWN_MS = 1500;

// score
let correctCount=0, totalCount=0;

/* ═══════════════════════════════════════════════════
   MODE SWITCH
═══════════════════════════════════════════════════ */
function setMode(m) {
  if(m==='soon') return;
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+m).classList.add('active');

  const isScale = m==='scale';
  document.getElementById('scale-ui').style.display   = isScale ? 'block' : 'none';
  document.getElementById('btn-roll').style.display   = isScale ? 'none'  : 'flex';
  document.getElementById('status-bar').style.display = isScale ? 'none'  : 'flex';
  document.getElementById('score-row').style.display  = isScale ? 'none'  : 'grid';

  // REC button: full width when no ROLL button beside it (scale mode)
  const btnStart = document.getElementById('btn-start');
  const btnStop  = document.getElementById('btn-stop');
  if(isScale){
    btnStart.style.gridColumn = '1 / -1';
    btnStop.style.gridColumn  = '1 / -1';
  } else {
    btnStart.style.gridColumn = '';
    btnStop.style.gridColumn  = '2';
  }

  resetScore();
  clearCooldown();

  if(isScale) {
    initScaleMode();
  } else {
    document.getElementById('target-note').textContent='?';
    document.getElementById('target-note').className='note-big';
    document.getElementById('target-alias').textContent='— กด ROLL เพื่อเริ่ม —';
    resetDetected();
    if(isListening) setStatus('listening','กำลังฟัง...');
    else setStatus('idle','ยังไม่ได้เปิดไมค์');
  }
}

/* ═══════════════════════════════════════════════════
   SIMPLE MODE
═══════════════════════════════════════════════════ */
function rollNote() {
  const list = NOTES_7;
  let n, tries=0;
  do { n=list[Math.floor(Math.random()*list.length)]; tries++; }
  while(n===targetNote && list.length>1 && tries<20);
  targetNote=n;

  const el=document.getElementById('target-note');
  el.textContent=n; el.className='note-big';
  document.getElementById('target-alias').textContent=
    ALIASES[n]?`(หรือ ${ALIASES[n]})`:`โน๊ต ${n}`;
  resetDetected();
  resetHold();
  clearCooldown();
  if(isListening) setStatus('listening',`กำลังฟัง... เล่นโน๊ต ${n}`);
}

function onSimpleCorrect(name, oct) {
  totalCount++; correctCount++;
  updateScore();
  flashRing();
  const el=document.getElementById('target-note');
  el.classList.add('correct');
  setStatus('correct',`✓ ถูกต้อง! ${name}${oct}`);
  startCooldown(()=>{
    el.classList.remove('correct');
    if(!isListening) return;
    rollNote();
  });
}

/* ═══════════════════════════════════════════════════
   SCALE MODE — SHAPE SELECTION
═══════════════════════════════════════════════════ */
function selectShape(sh) {
  currentShape = sh;
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sh-'+sh).classList.add('active');
  initScaleMode();
}

function initScaleMode() {
  scalePositions = getShapePositions(currentShape);
  scaleIndex     = 0;
  scaleDoneSet   = new Set();
  resetScore();
  clearCooldown();
  resetHold();
  resetDetected();

  const def = SHAPE_DEFS[currentShape];
  document.getElementById('scale-name').textContent =
    `${def.label} — C Major`;
  document.getElementById('note-prompt').textContent = '// เล่นโน๊ตนี้';

  renderScaleDots();
  setCurrentScaleNote();
  drawFretboard();
}

function setCurrentScaleNote() {
  if(scaleIndex >= scalePositions.length) {
    onScaleComplete();
    return;
  }
  const pos = scalePositions[scaleIndex];
  const el  = document.getElementById('target-note');
  el.textContent = pos.note;
  el.className   = 'note-big';
  document.getElementById('target-alias').textContent =
    `${pos.note}${pos.oct} — สาย ${sName(pos.s)}, เฟรต ${pos.f}`;

  resetHold();
  if(isListening) setStatus('listening',
    `เล่น ${pos.note}${pos.oct} — สาย ${sName(pos.s)} เฟรต ${pos.f}`);
  drawFretboard();
  renderScaleDots();
}

function onScaleNoteCorrect() {
  const pos = scalePositions[scaleIndex];
  scaleDoneSet.add(pos.id);
  totalCount++; correctCount++;
  updateScore();

  const el=document.getElementById('target-note');
  el.classList.add('correct');
  flashRing();
  renderScaleDots();
  drawFretboard();
  setStatus('correct',`✓ ${pos.note}${pos.oct} — สาย ${sName(pos.s)} เฟรต ${pos.f}`);

  scaleIndex++;
  startCooldown(()=>{
    el.classList.remove('correct');
    if(!isListening) return;
    setCurrentScaleNote();
  });
}

function onScaleComplete() {
  const def = SHAPE_DEFS[currentShape];
  setStatus('correct',`✓ ครบ ${def.label}! (${scalePositions.length} โน๊ต)`);
  document.getElementById('target-note').textContent='✓';
  document.getElementById('target-note').className='note-big correct';
  document.getElementById('target-alias').textContent='เล่นครบ shape นี้แล้ว! เลือก shape ถัดไปได้เลย';
  flashRing();
}

function renderScaleDots() {
  const total = scalePositions.length;
  const done  = scaleDoneSet.size;
  document.getElementById('scale-progress').textContent=`${done}/${total}`;

  const el = document.getElementById('scale-dots');
  el.innerHTML = scalePositions.map((p,i) => {
    let cls='scale-dot';
    if(scaleDoneSet.has(p.id)) cls+=' done';
    else if(i===scaleIndex) cls+=' current';
    return `<span class="${cls}" title="${p.note}${p.oct}">${p.note}</span>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════
   FRETBOARD SVG
═══════════════════════════════════════════════════ */
function drawFretboard() {
  const svg = document.getElementById('fretboard-svg');
  if(!svg) return;

  const def  = SHAPE_DEFS[currentShape];
  const fMin = def.fretMin, fMax = def.fretMax;
  const hasOpen = fMin === 0; // C shape includes open strings

  const W=480, H=150;
  const TOP=20, BOT=H-20, strH=(BOT-TOP)/5;
  const S_NAMES=['e','B','G','D','A','E'];
  const MARKERS=[3,5,7,9,12];

  // Layout: if open strings exist, reserve NUT_W px on the left for fret-0 dots
  // then frets 1..fMax use the remaining space
  const NUT_W   = hasOpen ? 44 : 0;
  const STR_LBL = 22;                        // string label area on far left
  const NECK_L  = STR_LBL + NUT_W;          // where fret 1 (or fMin) starts
  const NECK_R  = W - 10;
  const fretCount = hasOpen ? fMax : (fMax - fMin + 1); // number of fret slots after nut
  const fretW   = (NECK_R - NECK_L) / fretCount;

  // helper: get cx for a given fret number
  function fretCx(f) {
    if(hasOpen && f === 0) {
      // open string dot sits in the nut zone
      return STR_LBL + NUT_W / 2;
    }
    const slot = hasOpen ? f : (f - fMin); // slot index (0-based among fret slots)
    return NECK_L + (slot - 0.5) * fretW;  // centre of slot
  }

  let h='';
  h+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#161619"/>`;

  // String labels
  for(let row=0;row<6;row++){
    const y=TOP+row*strH;
    h+=`<text x="${STR_LBL-6}" y="${y+4}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="9" fill="#555568">${S_NAMES[row]}</text>`;
  }

  // NUT bar
  const nutX = STR_LBL + NUT_W;
  h+=`<rect x="${nutX-3}" y="${TOP}" width="5" height="${BOT-TOP}" fill="#888" rx="1"/>`;

  // fret lines (fret 1 .. fMax)
  for(let slot=1; slot<=fretCount; slot++){
    const x = NECK_L + slot * fretW;
    h+=`<line x1="${x}" y1="${TOP}" x2="${x}" y2="${BOT}" stroke="#3a3a46" stroke-width="${slot===fretCount?1.5:.5}"/>`;
  }

  // fret numbers below neck
  for(let slot=1; slot<=fretCount; slot++){
    const fret = hasOpen ? slot : (fMin + slot - 1);
    const x    = NECK_L + (slot - 0.5)*fretW;
    h+=`<text x="${x}" y="${H-5}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="8" fill="#555568">${fret}</text>`;
  }

  // Open label above nut zone
  if(hasOpen){
    h+=`<text x="${STR_LBL+NUT_W/2}" y="${TOP-6}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="7" fill="#555568">OPEN</text>`;
  }

  // fret dot position markers
  MARKERS.forEach(mf=>{
    if(mf < (hasOpen?1:fMin) || mf > fMax) return;
    const x  = fretCx(mf) - fretW/2 + fretW/2; // centre of that fret slot
    const cx = NECK_L + (hasOpen ? mf : mf-fMin) * fretW - fretW/2;
    const cy = TOP+(BOT-TOP)/2;
    if(mf===12){
      h+=`<circle cx="${cx}" cy="${cy-8}" r="3" fill="#2a2a32"/>`;
      h+=`<circle cx="${cx}" cy="${cy+8}" r="3" fill="#2a2a32"/>`;
    } else {
      h+=`<circle cx="${cx}" cy="${cy}" r="3" fill="#2a2a32"/>`;
    }
  });

  // strings
  for(let row=0;row<6;row++){
    const sIdx=5-row;
    const y=TOP+row*strH;
    const thick=0.6+(5-sIdx)*0.25;
    // draw from NUT right edge to end
    h+=`<line x1="${nutX+2}" y1="${y}" x2="${NECK_R}" y2="${y}" stroke="#3a3a46" stroke-width="${thick}"/>`;
    // draw open string section (left of nut) thinner
    if(hasOpen){
      h+=`<line x1="${STR_LBL}" y1="${y}" x2="${nutX-3}" y2="${y}" stroke="#2a2a32" stroke-width="1"/>`;
    }
  }

  // note dots
  scalePositions.forEach((pos,i) => {
    // skip if fret out of current window
    if(pos.f < fMin || pos.f > fMax) return;

    const row  = 5 - pos.s;
    const cx   = fretCx(pos.f);
    const cy   = TOP + row*strH;
    const isCur  = i===scaleIndex;
    const isDone = scaleDoneSet.has(pos.id);
    const isRoot = pos.isRoot;

    let fill, textFill, stroke='none', sw=0, r=10;
    if(isDone){
      fill='rgba(71,255,184,.18)'; textFill='#47ffb8'; stroke='#47ffb8'; sw=1.5;
    } else if(isCur){
      fill=isRoot?'#e8ff47':'#c8e830'; textFill='#0d0d0f'; stroke='#fff'; sw=1.5; r=12;
    } else {
      fill=isRoot?'rgba(232,255,71,.12)':'#1e1e23';
      textFill=isRoot?'rgba(232,255,71,.7)':'#555568';
      stroke=isRoot?'rgba(232,255,71,.4)':'#3a3a46'; sw=1;
    }

    if(isCur) h+=`<circle cx="${cx}" cy="${cy}" r="18" fill="rgba(232,255,71,.06)"/>`;

    h+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    if(isDone){
      h+=`<text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="10" fill="${textFill}">✓</text>`;
    } else {
      const label=pos.note.replace('#','');
      h+=`<text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="${isCur?9:8}" font-weight="700" fill="${textFill}">${label}</text>`;
    }
  });

  svg.innerHTML=h;
}

/* ═══════════════════════════════════════════════════
   COOLDOWN
═══════════════════════════════════════════════════ */
function startCooldown(callback) {
  isCooldown = true;
  resetHold();
  document.getElementById('cooldown-wrap').classList.add('visible');
  const fill = document.getElementById('cooldown-fill');
  fill.style.width='100%';

  const start = performance.now();
  function tick() {
    const elapsed = performance.now()-start;
    const pct = Math.max(0, 100*(1-elapsed/COOLDOWN_MS));
    fill.style.width = pct+'%';
    if(elapsed < COOLDOWN_MS) {
      cooldownTimer = requestAnimationFrame(tick);
    } else {
      clearCooldown();
      callback();
    }
  }
  cooldownTimer = requestAnimationFrame(tick);
  setStatus('cooldown','⏱ รอก่อน...');
}

function clearCooldown() {
  isCooldown=false;
  if(cooldownTimer) { cancelAnimationFrame(cooldownTimer); cooldownTimer=null; }
  document.getElementById('cooldown-wrap').classList.remove('visible');
  document.getElementById('cooldown-fill').style.width='100%';
}

/* ═══════════════════════════════════════════════════
   AUDIO / PITCH
═══════════════════════════════════════════════════ */
async function startListening(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048;
    sourceNode=audioCtx.createMediaStreamSource(stream);
    sourceNode.connect(analyser);
    isListening=true;
    document.getElementById('btn-start').style.display='none';
    document.getElementById('btn-stop').style.display='flex';
    updateStatusForCurrentTarget();
    startWaveAnim();
    detectLoop();
  }catch(e){
    setStatus('idle','ไม่สามารถเข้าถึงไมค์ได้ — กรุณาอนุญาตสิทธิ์');
  }
}

function stopListening(){
  isListening=false;
  clearCooldown();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(audioCtx){audioCtx.close();audioCtx=null;}
  cancelAnimationFrame(animFrameId);
  cancelAnimationFrame(waveAnimId);
  analyser=sourceNode=stream=null;
  document.getElementById('btn-start').style.display='flex';
  document.getElementById('btn-stop').style.display='none';
  document.querySelectorAll('.wv-bar').forEach(b=>{b.style.height='4px';b.classList.remove('active');});
  setStatus('idle','หยุดรับฟังแล้ว');
}

function detectLoop(){
  if(!isListening||!analyser) return;

  // During cooldown — still update detected display but ignore for matching
  const buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const freq=autoCorrelate(buf,audioCtx.sampleRate);

  if(freq>0){
    const result=freqToNote(freq);
    if(result){
      const dn=document.getElementById('detected-note');

      if(isCooldown){
        dn.textContent=result.name+result.oct;
        dn.className='detected-note paused';
        document.getElementById('detected-hz').textContent=Math.round(freq)+' Hz';
        document.getElementById('detected-cents').textContent='';
      } else {
        dn.textContent=result.name+result.oct;
        document.getElementById('detected-hz').textContent=Math.round(freq)+' Hz';
        const c=result.cents;
        document.getElementById('detected-cents').textContent=
          c===0?'ตรง ✓':(c>0?`+${c}¢ สูงเล็กน้อย`:`${c}¢ ต่ำเล็กน้อย`);

        if(currentMode==='simple' && targetNote){
          checkSimple(result, dn);
        } else if(currentMode==='scale' && scaleIndex < scalePositions.length){
          checkScale(result, dn);
        }
      }
    }
  } else {
    if(!isCooldown) resetDetected();
  }

  animFrameId=requestAnimationFrame(detectLoop);
}

function checkSimple(result, dn) {
  if(result.name===targetNote){
    dn.className='detected-note match';
    if(lastDetected===targetNote) matchHoldCount++;
    else{ matchHoldCount=1; lastDetected=result.name; }
    if(matchHoldCount>=MATCH_HOLD_REQUIRED) {
      resetHold();
      onSimpleCorrect(result.name, result.oct);
    } else {
      setStatus('listening',`กำลังยืนยัน ${result.name}${'·'.repeat(matchHoldCount)}`);
    }
  } else {
    dn.className='detected-note mismatch';
    resetHold();
    lastDetected=result.name;
    setStatus('wrong',`ได้ยิน ${result.name} — ต้องการ ${targetNote}`);
  }
}

function checkScale(result, dn) {
  const pos = scalePositions[scaleIndex];
  const noteMatch = result.name===pos.note;
  const octMatch  = result.oct===pos.oct;

  if(noteMatch && octMatch){
    dn.className='detected-note match';
    const id = result.name+result.oct;
    if(lastDetected===id) matchHoldCount++;
    else{ matchHoldCount=1; lastDetected=id; }
    if(matchHoldCount>=MATCH_HOLD_REQUIRED){
      resetHold();
      onScaleNoteCorrect();
    } else {
      setStatus('listening',`กำลังยืนยัน ${result.name}${result.oct}${'·'.repeat(matchHoldCount)}`);
    }
  } else if(noteMatch && !octMatch){
    dn.className='detected-note mismatch';
    resetHold(); lastDetected=result.name+result.oct;
    setStatus('wrong',`โน๊ตถูก แต่ Octave ผิด — ต้องการ ${pos.note}${pos.oct}`);
  } else {
    dn.className='detected-note mismatch';
    resetHold(); lastDetected=result.name+result.oct;
    setStatus('wrong',`ได้ยิน ${result.name}${result.oct} — ต้องการ ${pos.note}${pos.oct}`);
  }
}

function autoCorrelate(buf,sr){
  const SIZE=buf.length,MAX=Math.floor(SIZE/2);
  let rms=0;
  for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.01) return -1;
  let r1=0,r2=SIZE-1;
  for(let i=0;i<SIZE/2;i++){if(Math.abs(buf[i])<.2){r1=i;break;}}
  for(let i=1;i<SIZE/2;i++){if(Math.abs(buf[SIZE-i])<.2){r2=SIZE-i;break;}}
  const b=buf.slice(r1,r2+1);
  const c=new Float32Array(MAX);
  for(let i=0;i<MAX;i++) for(let j=0;j<MAX;j++) if(b[j]!==undefined&&b[j+i]!==undefined) c[i]+=b[j]*b[j+i];
  let d=0; while(c[d]>c[d+1]) d++;
  let mx=-1,pos=-1;
  for(let i=d;i<MAX;i++) if(c[i]>mx){mx=c[i];pos=i;}
  if(pos<1) return -1;
  let T0=pos;
  const x1=c[T0-1],x2=c[T0],x3=c[T0+1];
  const a=(x1+x3-2*x2)/2;
  if(a) T0-=(x3-x1)/(2*2*a);
  return sr/T0;
}

function freqToNote(freq){
  if(freq<70||freq>1100) return null;
  const semis=12*Math.log2(freq/440);
  const midi=Math.round(semis)+69;
  const idx=((midi%12)+12)%12;
  const oct=Math.floor(midi/12)-1;
  const cents=Math.round((semis-(midi-69))*100);
  return{name:NOTES_ALL[idx],oct,cents};
}

/* ═══════════════════════════════════════════════════
   WAVE ANIMATION
═══════════════════════════════════════════════════ */
function startWaveAnim(){
  const bars=document.querySelectorAll('.wv-bar');
  function frame(){
    if(!isListening) return;
    if(analyser){
      const data=new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      bars.forEach((b,i)=>{
        const v=data[Math.floor(i*data.length/bars.length/5)];
        b.style.height=(4+Math.round((v/255)*24))+'px';
        b.classList.toggle('active',v>30);
      });
    }
    waveAnimId=requestAnimationFrame(frame);
  }
  frame();
}

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function sName(s){ return ['E','A','D','G','B','e'][s]; }

function setStatus(type,txt){
  const bar=document.getElementById('status-bar');
  bar.className='status-bar '+type;
  const dot=type==='listening'?'<div class="mic-dot"></div>':'<span style="font-size:16px">◦</span>';
  bar.innerHTML=dot+'<span>'+txt+'</span>';
}

function updateStatusForCurrentTarget(){
  if(currentMode==='simple'&&targetNote)
    setStatus('listening',`กำลังฟัง... เล่นโน๊ต ${targetNote}`);
  else if(currentMode==='scale'&&scaleIndex<scalePositions.length){
    const p=scalePositions[scaleIndex];
    setStatus('listening',`เล่น ${p.note}${p.oct} — สาย ${sName(p.s)} เฟรต ${p.f}`);
  } else {
    setStatus('listening','กำลังฟัง...');
  }
}

function resetDetected(){
  const dn=document.getElementById('detected-note');
  dn.textContent='—'; dn.className='detected-note';
  document.getElementById('detected-hz').textContent='— Hz';
  document.getElementById('detected-cents').textContent='';
}

function resetHold(){ matchHoldCount=0; lastDetected=null; }

function flashRing(){
  const ring=document.createElement('div');
  ring.className='confirm-ring';
  document.getElementById('note-display').appendChild(ring);
  setTimeout(()=>ring.remove(),700);
}

function resetScore(){
  correctCount=0; totalCount=0;
  document.getElementById('sc-correct').textContent='0';
  document.getElementById('sc-total').textContent='0';
  document.getElementById('sc-pct').textContent='—';
}

function updateScore(){
  document.getElementById('sc-correct').textContent=correctCount;
  document.getElementById('sc-total').textContent=totalCount;
  document.getElementById('sc-pct').textContent=Math.round(correctCount/totalCount*100)+'%';
}

/* init */
setMode('simple');
</script>
